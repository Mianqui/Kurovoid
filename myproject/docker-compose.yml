services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://kurovoid:kurovoid@db:5432/kurovoid
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kurovoid
      POSTGRES_USER: kurovoid
      POSTGRES_PASSWORD: kurovoid
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
