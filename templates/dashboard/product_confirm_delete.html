{% extends "dashboard/base_dashboard.html" %}
{% load static %}

{% block title %}Eliminar producto{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center pt-20">
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-10">
        <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-red-950 border border-red-800 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.376zM12 17.25h.007v.008H12v-.008z" />
            </svg>
        </div>
        <h1 class="font-['Space_Grotesk'] text-xl font-bold mb-2">¿Eliminar producto?</h1>
        <p class="text-zinc-400 text-sm mb-2">Estás por eliminar <strong class="text-white">{{ product.name }}</strong>.</p>
        <p class="text-zinc-500 text-xs mb-8">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex items-center justify-center gap-3">
                <button type="submit" class="bg-red-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-red-500 transition-colors">
                    Eliminar
                </button>
                <a href="{% url 'dashboard:product_list' %}" class="text-zinc-500 hover:text-zinc-300 text-sm transition-colors">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
