{% extends "dashboard/base_dashboard.html" %}

{% block title %}Eliminar Imagen de Carrusel{% endblock %}

{% block content %}
<div class="max-w-md mx-auto pt-10">
  <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-8 text-center">
    <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    
    <h1 class="text-xl font-bold text-white mb-2">¿Eliminar imagen?</h1>
    <p class="text-zinc-400 mb-8">Esta acción no se puede deshacer. ¿Estás seguro de que deseas eliminar permanentemente esta imagen del carrusel?</p>

    <form method="post" class="flex items-center justify-center gap-3">
      {% csrf_token %}
      <a href="{% url 'dashboard:carousel_list' %}" class="px-6 py-2.5 bg-zinc-800 text-white rounded-lg text-sm font-medium hover:bg-zinc-700 transition-colors">
        Cancelar
      </a>
      <button type="submit" class="px-6 py-2.5 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600 transition-colors">
        Sí, eliminar
      </button>
    </form>
  </div>
</div>
{% endblock %}
